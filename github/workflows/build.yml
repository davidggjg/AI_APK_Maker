name: Build Android APK

on:
  push:
    branches: [ main ]
  workflow_dispatch: # מאפשר להפעיל את הבנייה ידנית

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'
          cache: gradle

      - name: Create Dummy Project # מייצר מבנה בסיסי כדי שהבנייה לא תיכשל
        run: |
          mkdir -p app/src/main/res/values
          echo 'apply plugin: "com.android.application"' > build.gradle
          # כאן האפליקציה שלך תזרוק את הקוד שה-AI מייצר
          
      - name: Build with Gradle
        run: ./gradlew assembleDebug

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-debug
          path: app/build/outputs/apk/debug/*.apk
